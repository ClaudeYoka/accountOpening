<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire de consentement – CEMAC</title>
    <style>
        body {
            font-family: "Times New Roman", serif;
            margin: 40px;
            line-height: 1.5;
        }
        h1, h2 {
            text-align: center;
            text-transform: uppercase;
        }
        h1 {
            font-size: 18px;
            text-decoration: underline;
        }
        h2 {
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        td {
            border: 1px solid #000;
            padding: 6px;
        }
        input[type="text"], input[type="date"] {
            width: 95%;
            border: none;
            outline: none;
            font-family: inherit;
        }
        textarea {
            width: 100%;
            border: none;
            resize: none;
            font-family: inherit;
        }
        .checkbox-group {
            margin-bottom: 10px;
        }
        .signature {
            margin-top: 40px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>ANNEXES</h1>

<h2>
    1. FORMULAIRE TYPE D’OBTENTION DU CONSENTEMENT DANS LE CADRE<br>
    DU SYSTÈME DE PARTAGE D’INFORMATIONS SUR LE CRÉDIT DANS LA CEMAC<br>
    (PERSONNE PHYSIQUE)
</h2>

<table>
    <tr>
        <td>Noms et Prénoms : <input type="text"></td>
        <td>Date : <input type="date"></td>
    </tr>
    <tr>
        <td>Adresse : <input type="text"></td>
        <td>Ville / Pays : <input type="text"></td>
    </tr>
    <tr>
        <td colspan="2">Numéro de compte : <input type="text"></td>
    </tr>
    <tr>
        <td colspan="2">Établissement domiciliataire : <input type="text"></td>
    </tr>
</table>

<div class="checkbox-group">
    <label>
        <input type="checkbox">
        Accepte que les informations de crédit, historiques et courantes, le concernant notamment,
        les soldes approuvés et en souffrance, les limites de crédit, les cessations de paiement,
        le solde des arriérés auprès des établissements de crédit, de microfinance et de paiement,
        ainsi que des sociétés d’assurances et fournisseurs de services de la CEMAC,
        soient communiquées par les bureaux d’informations sur le crédit agréés dans la CEMAC
        à <strong>[Nom de l’établissement utilisateur]</strong>.
    </label>
</div>

<div class="checkbox-group">
    <label>
        <input type="checkbox">
        Comprends que ces informations ne peuvent, en aucun cas,
        porter sur les dépôts de <strong>[Nom de la personne physique]</strong>.
    </label>
</div>

<div class="checkbox-group">
    <label>
        <input type="checkbox">
        Comprends que le(s) bureau(x) d’information sur le crédit agréé(s) dans la CEMAC
        ne diffusera (ont) que les informations dont l’ancienneté n’excède pas cinq (5) ans.
    </label>
</div>

<div class="checkbox-group">
    <label>
        <input type="checkbox">
        Comprends qu’il (elle) a le droit d’accès aux données le (la) concernant dans la (les)
        base(s) de données des bureaux d’information sur le crédit agréés dans la CEMAC afin
        de vérifier ses historiques de crédit, de contester et faire corriger ou radier des
        informations erronées dans ladite (lesdites) base(s) ou dans un rapport de crédit.
    </label>
</div>

<div class="checkbox-group">
    <label>
        <input type="checkbox">
        Comprends qu’il (elle) a le droit de recevoir toutes les informations conservées par les
        bureaux d’information sur le crédit agréés dans la CEMAC sur son historique de crédit,
        sous la forme d’un rapport de crédit, gratuitement une (1) fois par an en cas de litige
        lié à une erreur dans les données, imputable à <strong>[Nom de l’établissement]</strong>
        ou aux bureaux d’information sur le crédit agréés dans la CEMAC.
    </label>
</div>

<div class="signature">
    Signature
</div>

</body>
</html>
