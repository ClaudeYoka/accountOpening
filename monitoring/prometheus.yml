global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'account-opening-app'
    static_configs:
      - targets: ['web:80']
    metrics_path: '/metrics.php'
    scrape_interval: 30s

  - job_name: 'account-opening-business'
    static_configs:
      - targets: ['web:80']
    metrics_path: '/business_metrics.php'
    scrape_interval: 60s